{% extends "base.html" %}

{% block content %}
<h2>Dodaj nową ofertę wyjazdu</h2>

<form method="POST">
    <p>
        <label for="destination_id">Kierunek docelowy:</label><br />
        <select id="destination_id" name="destination_id" required>
            {% for dest in destinations %}
                <option value="{{ dest.id }}">{{ dest.country_name }} ({{ dest.currency_code }})</option>
            {% endfor %}
        </select>
    </p>

    <p>
        <label for="departure_date">Data wylotu:</label><br />
        <input type="date" id="departure_date" name="departure_date" required>
    </p>

    <p>
        <label for="return_date">Data powrotu:</label><br />
        <input type="date" id="return_date" name="return_date" required>
    </p>

    <p>
        <label for="departure_place">Miejsce wylotu:</label><br />
        <input type="text" id="departure_place" name="departure_place" placeholder="np. Kraków" required>
    </p>

    <p>
        <label for="price_local">Cena w walucie lokalnej:</label><br />
        <input type="number" step="0.01" id="price_local" name="price_local" required>
        <span class="small">(Kwota zostanie automatycznie przeliczona na PLN)</span>
    </p>

    <p>
        <button type="submit">Zapisz i opublikuj</button>
        <a href="/">Anuluj</a>
    </p>
</form>
{% endblock %}
