{% extends "base.html" %}

{% block content %}
<h2>Edytuj ofertę wyjazdu (ID: {{ trip.id }})</h2>

<form method="POST">
    <p>
        <label for="departure_date">Data wylotu:</label><br />
        <input type="date" id="departure_date" name="departure_date" value="{{ trip.departure_date }}" required>
    </p>

    <p>
        <label for="return_date">Data powrotu:</label><br />
        <input type="date" id="return_date" name="return_date" value="{{ trip.return_date }}" required>
    </p>

    <p>
        <label for="departure_place">Miejsce wylotu:</label><br />
        <input type="text" id="departure_place" name="departure_place" value="{{ trip.departure_place }}" required>
    </p>

    <p>
        <label for="price_local">Cena w walucie lokalnej:</label><br />
        <input type="number" step="0.01" id="price_local" name="price_local" value="{{ trip.price_local }}" required>
        <span class="small">(Kwota zostanie automatycznie przeliczona na PLN)</span>
    </p>

    <p>
        <button type="submit">Zapisz zmiany</button>
        <a href="/">Anuluj</a>
    </p>
</form>
{% endblock %}
